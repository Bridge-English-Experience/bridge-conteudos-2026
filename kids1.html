<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conteúdos Kids 1 2026 — Bridge English Experience</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green:#72a590;--yellow:#e2c64b;--blue:#4d5877;--orange:#dd6b36;
    --pink:#e65678;--red:#cc2b2b;--black:#111111;--white:#ffffff;--bg:#f9f8f6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--black);padding:2rem 1rem 4rem}
  .page{max-width:700px;margin:0 auto}
  .header{background:var(--blue);border-radius:20px;padding:2rem 2rem 1.75rem;margin-bottom:1.75rem;text-align:center}
  .logo-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:1rem}
  .logo-wordmark{font-size:26px;font-weight:800;letter-spacing:0.5px}
  .logo-wordmark .b{color:var(--red)}.logo-wordmark .r{color:var(--orange)}.logo-wordmark .i{color:var(--yellow)}
  .logo-wordmark .d{color:var(--green)}.logo-wordmark .g{color:var(--pink)}.logo-wordmark .e2{color:var(--white)}
  .logo-sub{font-size:11px;color:rgba(255,255,255,0.65);letter-spacing:0.08em;margin-top:-4px;text-align:center}
  .header h1{font-size:20px;font-weight:800;color:var(--white);margin-bottom:4px}
  .header .tagline{font-size:13px;color:rgba(255,255,255,0.75)}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="logo-row">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <line x1="18" y1="8" x2="28" y2="20" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
        <line x1="18" y1="8" x2="8" y2="20" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
        <line x1="8" y1="20" x2="18" y2="30" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
        <line x1="28" y1="20" x2="18" y2="30" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
        <line x1="8" y1="20" x2="28" y2="20" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
        <circle cx="18" cy="8" r="4" fill="#e2c64b"/>
        <circle cx="28" cy="20" r="4" fill="#e65678"/>
        <circle cx="18" cy="30" r="4" fill="#72a590"/>
        <circle cx="8" cy="20" r="4" fill="#dd6b36"/>
      </svg>
      <div>
        <div class="logo-wordmark"><span class="b">B</span><span class="r">R</span><span class="i">I</span><span class="d">D</span><span class="g">G</span><span class="e2">E</span></div>
        <div class="logo-sub">English Experience</div>
      </div>
    </div>
    <h1>Conteúdos Kids 1 — 2026</h1>
    <p class="tagline">Aqui você aprende o inglês com experiências e vivências!</p>
  </div>
</div>
</body>
</html>
