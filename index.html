<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bridge English Experience — Conteúdos 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #4d5877;
    --green: #72a590;
    --orange: #dd6b36;
    --pink: #e65678;
    --yellow: #e2c64b;
    --red: #cc2b2b;
    --bg: #f9f8f6;
    --white: #ffffff;
    --black: #111111;
    --border: rgba(0,0,0,0.1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--black);
    min-height: 100vh;
  }

  /* ── Top bar ── */
  .topbar {
    background: var(--blue);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .logo-wordmark { font-size: 22px; font-weight: 800; letter-spacing: 0.5px; }
  .logo-wordmark .b { color: var(--red); }
  .logo-wordmark .r { color: var(--orange); }
  .logo-wordmark .i { color: var(--yellow); }
  .logo-wordmark .d { color: var(--green); }
  .logo-wordmark .g { color: var(--pink); }
  .logo-wordmark .e2 { color: var(--white); }
  .logo-sub { font-size: 11px; color: rgba(255,255,255,0.6); letter-spacing: 0.08em; }
  .topbar-info { margin-left: auto; }
  .topbar-info p { font-size: 13px; color: rgba(255,255,255,0.7); text-align: right; }
  .topbar-info strong { color: var(--white); }

  /* ── Main ── */
  .main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .section-title {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--black);
    opacity: 0.4;
    margin-bottom: 1rem;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 3rem;
  }

  .card {
    background: var(--white);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 1.25rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-align: left;
    width: 100%;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.08); }
  .card:active { transform: scale(0.98); }

  .card-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 50px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    width: fit-content;
  }
  .card-title { font-size: 16px; font-weight: 800; color: var(--black); }
  .card-desc { font-size: 13px; color: #555; line-height: 1.5; flex: 1; }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
  }
  .card-level {
    font-size: 11px;
    font-weight: 700;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .card-arrow {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* ── Overlay ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    display: none;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
    overflow-y: auto;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--white);
    border-radius: 20px;
    width: 100%;
    max-width: 780px;
    min-height: 500px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal-bar {
    display: flex; align-items: center; gap: 12px;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .modal-bar-title { font-size: 15px; font-weight: 800; flex: 1; }
  .modal-close {
    background: #f0f0f0; border: none; cursor: pointer;
    width: 32px; height: 32px; border-radius: 50%;
    font-size: 18px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    color: #555;
  }
  .modal-close:hover { background: #e0e0e0; }
  .modal-body { flex: 1; }
  .modal-body iframe {
    width: 100%; border: none;
    min-height: 600px; display: block;
  }

  @media (max-width: 540px) {
    .topbar { flex-wrap: wrap; gap: 8px; }
    .topbar-info { margin-left: 0; }
    .topbar-info p { text-align: left; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
    <line x1="18" y1="8" x2="28" y2="20" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
    <line x1="18" y1="8" x2="8" y2="20" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
    <line x1="8" y1="20" x2="18" y2="30" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
    <line x1="28" y1="20" x2="18" y2="30" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
    <line x1="8" y1="20" x2="28" y2="20" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
    <circle cx="18" cy="8" r="4" fill="#e2c64b"/>
    <circle cx="28" cy="20" r="4" fill="#e65678"/>
    <circle cx="18" cy="30" r="4" fill="#72a590"/>
    <circle cx="8" cy="20" r="4" fill="#dd6b36"/>
  </svg>
  <div>
    <div class="logo-wordmark">
      <span class="b">B</span><span class="r">R</span><span class="i">I</span><span class="d">D</span><span class="g">G</span><span class="e2">E</span>
    </div>
    <div class="logo-sub">English Experience</div>
  </div>
  <div class="topbar-info">
    <p><strong>Conteúdos 2026</strong></p>
    <p>Músicas · Histórias · Atividades</p>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <p class="section-title">Selecione a turma</p>
  <div class="grid" id="grid"></div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-bar">
      <span class="modal-bar-title" id="modal-title"></span>
      <button class="modal-close" id="close-btn">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
const artifacts = [
  {
    title: "Toddlers",
    desc: "Família, cores, números, corpo, roupas, formas, animais e transportes.",
    badge: "2 – 4 anos",
    badgeBg: "#FBEAF0",
    badgeColor: "#993556",
    arrowBg: "#FBEAF0",
    arrowColor: "#993556",
    months: "Fev · Mar · Abr · Mai · Jun · Jul",
    src: "toddlers.html"
  },
  {
    title: "Kids 1",
    desc: "Identidade, materiais escolares, sentimentos, alimentos, rotina, família, esportes e animais.",
    badge: "Kids 1",
    badgeBg: "#E6F1FB",
    badgeColor: "#185FA5",
    arrowBg: "#E6F1FB",
    arrowColor: "#185FA5",
    months: "Fev · Mar · Abr · Mai · Jun",
    src: "kids1.html"
  }
];

const grid = document.getElementById('grid');
const overlay = document.getElementById('overlay');
const modalTitle = document.getElementById('modal-title');
const modalBody = document.getElementById('modal-body');
const closeBtn = document.getElementById('close-btn');

artifacts.forEach(a => {
  const card = document.createElement('button');
  card.className = 'card';
  card.innerHTML = `
    <span class="card-badge" style="background:${a.badgeBg};color:${a.badgeColor}">${a.badge}</span>
    <div class="card-title">${a.title}</div>
    <div class="card-desc">${a.desc}</div>
    <div class="card-footer">
      <span class="card-level">${a.months}</span>
      <div class="card-arrow" style="background:${a.arrowBg};color:${a.arrowColor}">↗</div>
    </div>
  `;
  card.addEventListener('click', () => {
    modalTitle.textContent = a.title + ' — 2026';
    const iframe = document.createElement('iframe');
    iframe.src = a.src;
    iframe.style.cssText = 'width:100%;border:none;min-height:600px;display:block';
    modalBody.innerHTML = '';
    modalBody.appendChild(iframe);
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  });
  grid.appendChild(card);
});

function closeModal() {
  overlay.classList.remove('open');
  modalBody.innerHTML = '';
  document.body.style.overflow = '';
}
closeBtn.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
