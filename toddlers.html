<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conteúdos Toddlers 2026 — Bridge English Experience</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green:  #72a590;
    --yellow: #e2c64b;
    --blue:  #4d5877;
    --orange: #dd6b36;
    --pink:   #e65678;
    --red:    #cc2b2b;
    --black:  #111111;
    --white:  #ffffff;
    --bg:     #f9f8f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--black); padding: 2rem 1rem 4rem; }
  .page { max-width: 700px; margin: 0 auto; }
  .header { background: var(--blue); border-radius: 20px; padding: 2rem 2rem 1.75rem; margin-bottom: 1.75rem; text-align: center; }
  .logo-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 1rem; }
  .logo-wordmark { font-size: 26px; font-weight: 800; letter-spacing: 0.5px; }
  .logo-wordmark .b { color: var(--red); }
  .logo-wordmark .r { color: var(--orange); }
  .logo-wordmark .i { color: var(--yellow); }
  .logo-wordmark .d { color: var(--green); }
  .logo-wordmark .g { color: var(--pink); }
  .logo-wordmark .e2 { color: var(--white); }
  .logo-sub { font-size: 11px; font-weight: 400; color: rgba(255,255,255,0.65); letter-spacing: 0.08em; margin-top: -4px; text-align: center; }
  .header h1 { font-size: 20px; font-weight: 800; color: var(--white); margin-bottom: 4px; }
  .header .tagline { font-size: 13px; color: rgba(255,255,255,0.75); font-weight: 400; }
  .intro-card { background: var(--white); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.75rem; border-left: 5px solid var(--green); font-size: 14px; line-height: 1.75; }
  .intro-card p + p { margin-top: 0.75rem; }
  .month-block { margin-bottom: 2rem; }
  .month-pill { display: inline-block; font-size: 13px; font-weight: 800; padding: 5px 16px; border-radius: 50px; color: var(--white); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
  .pill-feb { background: var(--pink); }
  .pill-apr { background: var(--green); }
  .pill-may { background: var(--blue); }
  .pill-jun { background: var(--orange); }
  .month-desc { background: var(--white); border-radius: 14px; padding: 1rem 1.25rem; font-size: 14px; line-height: 1.7; margin-bottom: 12px; }
  .month-desc strong { font-weight: 700; }
  .section-label { font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--black); opacity: 0.45; margin: 14px 0 8px; }
  .link-list { display: flex; flex-direction: column; gap: 7px; }
  .link-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--white); border-radius: 12px; text-decoration: none; color: var(--black); font-size: 14px; font-weight: 600; transition: opacity 0.12s; }
  .link-item:hover { opacity: 0.7; }
  .link-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .link-label { flex: 1; line-height: 1.35; }
  .link-arrow { font-size: 14px; font-weight: 700; flex-shrink: 0; opacity: 0.35; }
  .cta-strip { background: var(--orange); border-radius: 16px; padding: 1.5rem; margin-top: 2rem; text-align: center; color: var(--white); }
  .cta-strip p { font-size: 14px; line-height: 1.7; margin-bottom: 1rem; }
  .cta-strip .sign { font-size: 14px; font-weight: 700; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="logo-row">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
        <line x1="18" y1="8" x2="28" y2="20" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
        <line x1="18" y1="8" x2="8" y2="20" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
        <line x1="8" y1="20" x2="18" y2="30" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
        <line x1="28" y1="20" x2="18" y2="30" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
        <line x1="8" y1="20" x2="28" y2="20" stroke="rgba(255,255,255,0.4)" stroke-width="1.2"/>
        <circle cx="18" cy="8" r="4" fill="#e2c64b"/>
        <circle cx="28" cy="20" r="4" fill="#e65678"/>
        <circle cx="18" cy="30" r="4" fill="#72a590"/>
        <circle cx="8" cy="20" r="4" fill="#dd6b36"/>
      </svg>
      <div>
        <div class="logo-wordmark"><span class="b">B</span><span class="r">R</span><span class="i">I</span><span class="d">D</span><span class="g">G</span><span class="e2">E</span></div>
        <div class="logo-sub">English Experience</div>
      </div>
    </div>
    <h1>Conteúdos Toddlers — 2026</h1>
    <p class="tagline">Aqui você aprende o inglês com experiências e vivências!</p>
  </div>
